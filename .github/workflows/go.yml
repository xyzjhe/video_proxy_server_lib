name: Cross Compile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - { goos: linux, goarch: amd64, cgo: 1, zig_target: 'x86_64-linux-gnu' }
          - { goos: linux, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-gnu' }
          - { goos: linux, goarch: arm, cgo: 1, zig_target: 'arm-linux-gnueabihf' }

          # Windows 平台
          - { goos: windows, goarch: amd64, cgo: 1, zig_target: 'x86_64-windows-gnu' }

          # macOS 平台
          - { goos: darwin, goarch: amd64, cgo: 1, zig_target: 'x86_64-macos' }
          - { goos: darwin, goarch: arm64, cgo: 1, zig_target: 'aarch64-macos' }

          # Android 平台
          - { goos: android, goarch: arm, cgo: 1, zig_target: 'arm-linux-androideabi', api: 26 }
          - { goos: android, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-android', api: 26 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # 安装 Zig
      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'

      # 为 macOS 交叉编译安装 osxcross 和 macOS SDK
      - name: Set up osxcross for macOS cross-compile
        if: matrix.goos == 'darwin'
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "12.3"

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARM: ${{ matrix.goarm }}
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            EXT=".dylib"
          else
            EXT=".so"
          fi

          # 为 macOS 目标设置 SDKROOT（osxcross 默认安装路径）
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export SDKROOT="$(pwd)/osxcross/SDK/MacOSX12.3.sdk"
            echo "SDKROOT set to: $SDKROOT"
          fi

          # 使用 Zig 作为 CC 进行交叉编译
          if [ "${{ matrix.goos }}" = "android" ]; then
            export CC="zig cc -target ${{ matrix.zig_target }}${{ matrix.api }} -Wno-unused-command-line-argument"
          else
            export CC="zig cc -target ${{ matrix.zig_target }} -Wno-unused-command-line-argument"
          fi

          echo "Using Zig CC: $CC"

          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}" .

      - name: Compress Artifacts
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            EXT=".dylib"
          else
            EXT=".so"
          fi

          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" "${NAME}${EXT}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}${EXT}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server-${{ matrix.goos }}-${{ matrix.goarch }}.*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            server-${{ matrix.goos }}-${{ matrix.goarch }}.*