name: Cross Compile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==================== 交叉编译：Linux / Windows / Android ====================
  build-cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - { goos: linux, goarch: amd64, cgo: 1 }

          # Windows 平台
          - { goos: windows, goarch: amd64, cgo: 1 }

          # Android 平台
          - { goos: android, goarch: arm, cgo: 1, ndk_arch: arm-linux-androideabi, api: 26, goarm: 7 }
          - { goos: android, goarch: arm64, cgo: 1, ndk_arch: aarch64-linux-android, api: 26 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install MinGW-w64
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Set up Android NDK
        if: matrix.goos == 'android'
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '26.1.10909125'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARM: ${{ matrix.goarm }}
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
            export CC="x86_64-w64-mingw32-gcc"
          else
            EXT=".so"
          fi
          
          if [ "${{ matrix.goos }}" = "android" ]; then
            if [ "${{ matrix.goarch }}" = "arm" ]; then
              export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi${{ matrix.api }}-clang"
            else
              export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_arch }}${{ matrix.api }}-clang"
            fi
            echo "Using Android CC: $CC"
          fi
          
          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}" .

      - name: Compress Artifacts
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
          else
            EXT=".so"
          fi
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" "${NAME}${EXT}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}${EXT}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server-${{ matrix.goos }}-${{ matrix.goarch }}.*

  # ==================== 原生编译：macOS (darwin) ====================
  build-darwin:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: amd64, cgo: 1 }
          - { goos: darwin, goarch: arm64, cgo: 1 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=".dylib"
          
          # macOS 原生环境，CC 默认就是 clang，无需额外配置
          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}" .

      - name: Compress Artifacts
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          tar czf "${NAME}.tar.gz" "${NAME}.dylib"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server-${{ matrix.goos }}-${{ matrix.goarch }}.*

  # ==================== 发布 Release ====================
  release:
    needs: [build-cross, build-darwin]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*