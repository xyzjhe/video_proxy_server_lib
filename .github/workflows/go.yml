name: Cross Compile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - { goos: linux, goarch: amd64, cgo: 1, zig_target: 'x86_64-linux-gnu' }
          - { goos: linux, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-gnu' }
          - { goos: linux, goarch: arm,   cgo: 1, zig_target: 'arm-linux-gnueabihf', goarm: 7 }

          # Windows 平台
          - { goos: windows, goarch: amd64, cgo: 1, zig_target: 'x86_64-windows-gnu' }

          # macOS 平台
          - { goos: darwin, goarch: amd64, cgo: 1, zig_target: 'x86_64-macos' }
          - { goos: darwin, goarch: arm64, cgo: 1, zig_target: 'aarch64-macos' }

          # Android 平台
          - { goos: android, goarch: arm,   cgo: 1, zig_target: 'arm-linux-androideabi', api: 26 }
          - { goos: android, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-android', api: 26 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Set up osxcross for macOS cross-compile
        if: matrix.goos == 'darwin'
        uses: mbround18/setup-osxcross@v1
        with:
          osx-version: "12.3"

      # 统一构建步骤：编译动态库 + 设置后续步骤所需的环境变量
      - name: Build Binary
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARM:  ${{ matrix.goarm }}
        run: |
          # ---------- 1. 确定产物名称与扩展名 ----------
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          case "${{ matrix.goos }}" in
            windows) EXT=".dll"   ;;
            darwin)  EXT=".dylib" ;;
            *)       EXT=".so"    ;;
          esac

          echo "NAME=$NAME" >> $GITHUB_ENV
          echo "EXT=$EXT"   >> $GITHUB_ENV

          # ---------- 2. macOS SDK 路径 ----------
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            # 自动查找 osxcross 安装的 SDK（匹配首个 MacOSX*.sdk）
            SDKROOT="$(ls -d $(pwd)/osxcross/SDK/MacOSX*.sdk | head -1)"
            echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          fi

          # ---------- 3. 创建 zig cc wrapper（解决 CC 不能带参数的问题） ----------
          TARGET="${{ matrix.zig_target }}${{ matrix.api }}"
          cat > ./zig-cc <<EOF
          #!/bin/sh
          zig cc -target ${TARGET} -Wno-unused-command-line-argument "\$@"
          EOF
          chmod +x ./zig-cc
          export CC="$(pwd)/zig-cc"
          echo "Using Zig CC for target: $TARGET"

          # ---------- 4. 执行编译 ----------
          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}" .

          # ---------- 5. 确定最终要上传的压缩包名称 ----------
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="${NAME}.zip"
          else
            ARCHIVE="${NAME}.tar.gz"
          fi
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      # 打包产物（使用上一步设置的环境变量）
      - name: Compress Artifacts
        run: |
          echo "Creating archive: ${{ env.ARCHIVE }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${{ env.ARCHIVE }}" "${{ env.NAME }}${{ env.EXT }}"
          else
            tar czf "${{ env.ARCHIVE }}" "${{ env.NAME }}${{ env.EXT }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}
          path: ${{ env.ARCHIVE }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ARCHIVE }}