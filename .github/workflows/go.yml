name: Cross Compile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - { goos: linux, goarch: amd64, cgo: 1, zig_target: 'x86_64-linux-gnu', os: 'ubuntu-latest' }
          - { goos: linux, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-gnu', os: 'ubuntu-latest' }
          - { goos: linux, goarch: arm, cgo: 1, zig_target: 'arm-linux-gnueabihf', os: 'ubuntu-latest' }

          # Windows 平台
          - { goos: windows, goarch: amd64, cgo: 1, zig_target: 'x86_64-windows-gnu', os: 'windows-latest' }

          # macOS 平台
          - { goos: darwin, goarch: amd64, cgo: 1, zig_target: 'x86_64-macos', os: 'macos-latest' }
          - { goos: darwin, goarch: arm64, cgo: 1, zig_target: 'aarch64-macos', os: 'macos-latest' }

          # Android 平台
          - { goos: android, goarch: arm, cgo: 1, zig_target: 'arm-linux-androideabi26-clang', api: 26, os: 'ubuntu-latest' }
          - { goos: android, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-android26-clang', api: 26, os: 'ubuntu-latest' }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # 安装 Zig（统一替代 MinGW / NDK / GCC 等工具链）
      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARM: ${{ matrix.goarm }}
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            EXT=".dylib"
          else
            EXT=".so"
          fi

          # 使用 Zig 作为 CC 进行交叉编译
          if [ "${{ matrix.goos }}" = "android" ]; then
            # Android 需要指定 API 级别
            export CC="zig cc -target ${{ matrix.zig_target }} -v"
          else
            export CC="zig cc -target ${{ matrix.zig_target }} -v"
          fi

          echo "Using Zig CC: $CC"

          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}" .

      - name: Compress Artifacts
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
            zip "${NAME}.zip" "${NAME}${EXT}"
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            EXT=".dylib"
            zip "${NAME}.zip" "${NAME}${EXT}"
          else
            EXT=".so"
            tar czf "${NAME}.tar.gz" "${NAME}${EXT}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server-${{ matrix.goos }}-${{ matrix.goarch }}.*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            server-${{ matrix.goos }}-${{ matrix.goarch }}.*
