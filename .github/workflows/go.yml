name: Cross Compile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 即使某一个平台失败，其他平台也继续构建
      matrix:
        include:
          # Linux 平台
          - { goos: linux, goarch: amd64, cgo: 1 }


          # Windows 平台
          - { goos: windows, goarch: amd64, cgo: 1 }

          # Android 平台 (必须开启 CGO 并配置 NDK)
          - { goos: android, goarch: arm, cgo: 1, ndk_arch: arm-linux-androideabi, api: 26 }
          - { goos: android, goarch: arm64, cgo: 1, ndk_arch: aarch64-linux-android, api: 26 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      # 安装 Windows 交叉编译工具链
      - name: Install MinGW-w64
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \

      # 仅在需要 Android NDK 时才安装（节省其他矩阵的运行时间）
      - name: Set up Android NDK
        if: matrix.goos == 'android'
        uses: android-actions/setup-android@v3
        with:
          # 安装指定的 NDK 版本
          ndk-version: '26.1.10909125'

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARM: ${{ matrix.goarm }}
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
            export CC="x86_64-w64-mingw32-gcc"
          else
            EXT=".so"
          fi
          
          # 如果是 Android 平台，配置 NDK 交叉编译器环境
          if [ "${{ matrix.goos }}" = "android" ]; then
            # 针对不同架构，现代 NDK 的 Clang 文件名拼接规则不同
            if [ "${{ matrix.goarch }}" = "arm" ]; then
              # 32位 arm 使用 armv7a-linux-androideabi${API}-clang
              export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi${{ matrix.api }}-clang"
            else
              # 64位 arm64 使用 aarch64-linux-android${API}-clang
              export CC="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.ndk_arch }}${{ matrix.api }}-clang"
            fi
            echo "Using Android CC: $CC"
          fi
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
             export CC="aarch64-linux-gnu-gcc"
          elif [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm" ]; then
              export CC="arm-linux-gnueabihf-gcc"
          fi
          
          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}"  .

      - name: Compress Artifacts
        run: |
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".dll"
          else
            EXT=".so"
          fi
         
          
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${NAME}.zip" "${NAME}${EXT}"
          else
            tar czf "${NAME}.tar.gz" "${NAME}${EXT}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server-${{ matrix.goos }}-${{ matrix.goarch }}.*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            server-${{ matrix.goos }}-${{ matrix.goarch }}.*