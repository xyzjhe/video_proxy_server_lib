name: Cross Compile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - { goos: linux, goarch: amd64, cgo: 1, zig_target: 'x86_64-linux-gnu' }
          - { goos: linux, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-gnu' }
          - { goos: linux, goarch: arm,   cgo: 1, zig_target: 'arm-linux-gnueabihf', goarm: 7 }

          # Windows 平台
          - { goos: windows, goarch: amd64, cgo: 1, zig_target: 'x86_64-windows-gnu' }

          # macOS 平台（Zig 原生支持，无需 osxcross）
          - { goos: darwin, goarch: amd64, cgo: 1, zig_target: 'x86_64-macos' }
          - { goos: darwin, goarch: arm64, cgo: 1, zig_target: 'aarch64-macos' }

          # Android 平台
          - { goos: android, goarch: arm,   cgo: 1, zig_target: 'arm-linux-androideabi', api: 26 }
          - { goos: android, goarch: arm64, cgo: 1, zig_target: 'aarch64-linux-android', api: 26 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'

      # ========== 缓存 Go 模块 ==========
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      # ========== 统一构建步骤 ==========
      - name: Build Binary
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          GOARM:  ${{ matrix.goarm }}
        run: |
          set -euo pipefail

          # ---------- 1. 确定产物名称与扩展名 ----------
          NAME="server-${{ matrix.goos }}-${{ matrix.goarch }}"
          case "${{ matrix.goos }}" in
            windows) EXT=".dll"   ;;
            darwin)  EXT=".dylib" ;;
            *)       EXT=".so"    ;;
          esac

          echo "NAME=$NAME" >> $GITHUB_ENV
          echo "EXT=$EXT"   >> $GITHUB_ENV

          # ---------- 2. 构建 Zig target 字符串 ----------
          # Android 需要附加 API level，格式为 <target>.<api>
          if [ "${{ matrix.goos }}" = "android" ]; then
            TARGET="${{ matrix.zig_target }}.${{ matrix.api }}"
          else
            TARGET="${{ matrix.zig_target }}"
          fi

          # ---------- 3. 创建 zig cc wrapper ----------
          # 解决 CC 环境变量不能带参数的问题
          cat > ./zig-cc <<EOF
          #!/bin/sh
          exec zig cc -target ${TARGET} -Wno-unused-command-line-argument "\$@"
          EOF
          chmod +x ./zig-cc

          # 写入 GITHUB_ENV，确保后续步骤也能使用
          echo "CC=$(pwd)/zig-cc" >> $GITHUB_ENV
          echo "Using Zig CC for target: $TARGET"

          # ---------- 4. 执行编译 ----------
          go build -ldflags="-s -w" -buildmode=c-shared -o "${NAME}${EXT}" .

          # ---------- 5. 确定压缩包名称 ----------
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ARCHIVE="${NAME}.zip"
          else
            ARCHIVE="${NAME}.tar.gz"
          fi
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      # ========== 产物校验 ==========
      - name: Verify Binary
        run: |
          echo "=== File info ==="
          file "${{ env.NAME }}${{ env.EXT }}"
          echo "=== Size ==="
          ls -lh "${{ env.NAME }}${{ env.EXT }}"

      # ========== 打包产物 ==========
      - name: Compress Artifacts
        run: |
          echo "Creating archive: ${{ env.ARCHIVE }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${{ env.ARCHIVE }}" "${{ env.NAME }}${{ env.EXT }}"
          else
            tar czf "${{ env.ARCHIVE }}" "${{ env.NAME }}${{ env.EXT }}"
          fi

      # ========== 上传 Artifact ==========
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}
          path: ${{ env.ARCHIVE }}

      # ========== 发布到 GitHub Release ==========
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ARCHIVE }}